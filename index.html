<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Water</title>
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Water">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #060f1e;
      --surface:   #0d1f38;
      --surface2:  #132844;
      --border:    #1e3a5f;
      --water:     #3b9eff;
      --water-dim: #1d5fa8;
      --water-glow:#3b9eff44;
      --text:      #e8f4ff;
      --text-dim:  #7aa8d4;
      --danger:    #ff5c5c;
      --success:   #4ecb8d;
      --tab-h:     64px;
      --radius:    16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, #0a3060 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, #0a2548 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCREENS ── */
    #screens {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      bottom: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      position: relative;
      z-index: 10;
      height: 48px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s;
      font-size: 22px;
      line-height: 1;
    }
    .tab-btn.active { color: var(--water); filter: drop-shadow(0 0 6px #3b9eff88); }

    /* ── HEADER ── */
    header {
      padding: 16px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--water);
    }

    .date-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── RING ── */
    .ring-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 24px 8px;
      flex-shrink: 0;
    }

    .ring-wrap { position: relative; width: 180px; height: 180px; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: var(--surface2); stroke-width: 12; }
    .ring-fill {
      fill: none; stroke: var(--water); stroke-width: 12; stroke-linecap: round;
      stroke-dasharray: 503; stroke-dashoffset: 503;
      filter: drop-shadow(0 0 8px var(--water));
      transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
    }
    .ring-fill.over { stroke: var(--success); filter: drop-shadow(0 0 8px var(--success)); }

    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-ml {
      font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800;
      color: var(--text); line-height: 1;
    }
    .ring-unit { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .ring-goal { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    .status-bar {
      text-align: center; font-size: 12px; color: var(--text-dim);
      padding: 6px 24px 16px; letter-spacing: 0.05em; flex-shrink: 0;
    }
    .status-bar.done { color: var(--success); }

    /* ── SECTIONS ── */
    .section { padding: 0 20px 14px; flex-shrink: 0; }
    .section-label {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 10px;
    }

    .presets-grid { display: flex; flex-wrap: wrap; gap: 10px; }

    .preset-btn {
      background: var(--water); border: none; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700;
      border-radius: 14px; padding: 16px 0; flex: 1; min-width: 80px;
      cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      -webkit-user-select: none; user-select: none;
    }
    .preset-btn span { font-size: 10px; color: #ffffffaa; font-family: 'DM Mono', monospace; font-weight: 300; }
    .preset-btn:active { opacity: 0.75; transform: scale(0.96); }

    .custom-row { display: flex; gap: 10px; align-items: stretch; overflow: hidden; }
    .custom-input {
      min-width: 0;
      flex: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 20px; padding: 14px 18px;
      outline: none; transition: border-color 0.2s;
    }
    .custom-input:focus { border-color: var(--water); }
    .custom-input::placeholder { color: var(--text-dim); font-size: 14px; }
    .custom-go {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--water);
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      padding: 14px 20px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
    }
    .custom-go:active { background: var(--water); color: #fff; }

    /* ── HISTORY SCREEN ── */
    .hist-header {
      padding: 16px 24px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    .hist-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 22px; color: var(--water);
    }

    /* Day navigator */
    .day-nav {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      flex-shrink: 0; margin: 0 20px 16px;
    }

    .day-nav-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 20px; padding: 12px 18px; cursor: pointer;
      transition: all 0.15s;
    }
    .day-nav-btn:active { background: var(--surface2); color: var(--water); }
    .day-nav-btn:disabled { opacity: 0.3; cursor: default; }

    .day-nav-label {
      flex: 1; text-align: center;
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px;
      color: var(--text); letter-spacing: 0.03em;
    }
    .day-nav-sub {
      display: block; font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-dim); font-weight: 300; margin-top: 1px;
    }

    /* History log list */
    .hist-list {
      padding: 0 20px 32px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .hist-entry {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px;
      display: flex; align-items: center; gap: 14px;
    }

    .hist-time {
      font-size: 13px; color: var(--text-dim); min-width: 42px;
      font-family: 'DM Mono', monospace;
    }

    .hist-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--water); flex-shrink: 0;
    }

    .hist-ml {
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 16px;
      color: var(--text); flex: 1;
    }
    .hist-ml-unit { font-size: 12px; color: var(--text-dim); margin-left: 2px; }

    .hist-pct-entry {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--water); min-width: 36px; text-align: right;
    }

    .hist-loading {
      text-align: center; color: var(--text-dim); font-size: 12px;
      padding: 40px 0; letter-spacing: 0.05em;
    }

    /* ── SETTINGS SCREEN ── */
    .settings-screen-header {
      padding: 16px 24px 24px;
      flex-shrink: 0;
    }
    .settings-screen-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 22px; color: var(--water);
    }

    .settings-body {
      padding: 0 20px 32px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .setting-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
    }
    .setting-card label {
      display: block; font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
    }
    .setting-input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 16px; padding: 12px 16px; outline: none;
    }
    .setting-input:focus { border-color: var(--water); }

    .settings-save {
      width: 100%; background: var(--water); border: none; border-radius: 14px;
      color: #fff; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
      padding: 16px; cursor: pointer; letter-spacing: 0.05em; margin-top: 4px;
    }
    .settings-save:active { opacity: 0.8; }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      position: fixed; inset: 0; z-index: 200; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
    }
    .setup-logo { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; color: var(--water); }
    .setup-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 40px; letter-spacing: 0.05em; }
    .setup-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; text-align: left; width: 100%; margin-bottom: 8px; }
    .setup-input {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 13px; padding: 14px 16px; outline: none; margin-bottom: 24px;
    }
    .setup-input:focus { border-color: var(--water); }
    .setup-btn {
      width: 100%; background: var(--water); border: none; border-radius: 14px;
      color: #fff; font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700;
      padding: 18px; cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 300;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── SPINNER ── */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 400; background: #00000044;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--water); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen" style="display:none">
  <div class="setup-logo">💧</div>
  <div class="setup-logo" style="font-size:28px;margin-top:-8px;margin-bottom:4px">Water</div>
  <div class="setup-sub">Einmalig einrichten</div>
  <div class="setup-label">Google Apps Script URL</div>
  <input class="setup-input" id="setup-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <div class="setup-label">Tagesziel (ml)</div>
  <input class="setup-input" id="setup-goal" type="number" value="2500" inputmode="numeric">
  <button class="setup-btn" onclick="saveSetup()">Speichern & Starten</button>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SCREENS -->
<div id="screens">

  <!-- ── SCREEN 1: HOME ── -->
  <div class="screen active" id="screen-home">
    <header>
      <div class="logo">💧 Water</div>
      <div class="date-label" id="date-label"></div>
    </header>

    <div class="ring-section">
      <div class="ring-wrap">
        <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg"   cx="90" cy="90" r="80"/>
          <circle class="ring-fill" cx="90" cy="90" r="80" id="ring-fill"/>
        </svg>
        <div class="ring-center">
          <div class="ring-ml" id="ring-ml">0</div>
          <div class="ring-unit">ml</div>
          <div class="ring-goal" id="ring-goal">/ 2500 ml</div>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status-bar">Noch nichts getrunken heute</div>

    <div class="section">
      <div class="section-label">Schnell hinzufügen</div>
      <div class="presets-grid" id="presets-grid"></div>
    </div>

    <div class="section">
      <div class="section-label">Manuell</div>
      <div class="custom-row">
        <input class="custom-input" id="custom-ml" type="number" inputmode="numeric" placeholder="ml eingeben">
        <button class="custom-go" onclick="addCustom()">+ ADD</button>
      </div>
    </div>

  </div>

  <!-- ── SCREEN 2: HISTORY ── -->
  <div class="screen" id="screen-history">
    <div class="hist-header">
      <div class="hist-title">📋 Verlauf</div>
    </div>

    <!-- Day Navigator -->
    <div class="day-nav">
      <button class="day-nav-btn" id="hist-prev" onclick="histNav(-1)">‹</button>
      <div class="day-nav-label" id="hist-day-label">
        Heute
        <span class="day-nav-sub" id="hist-day-sub"></span>
      </div>
      <button class="day-nav-btn" id="hist-next" onclick="histNav(+1)" disabled>›</button>
    </div>

    <!-- Chart -->
    <div style="margin: 0 20px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px 10px;">
      <canvas id="hist-chart" height="160" style="width:100%;display:block;"></canvas>
    </div>

    <!-- Log -->
    <div class="hist-list" id="hist-list">
      <div class="hist-loading">Lade…</div>
    </div>
  </div>

  <!-- ── SCREEN 3: SETTINGS ── -->
  <div class="screen" id="screen-settings">
    <div class="settings-screen-header">
      <div class="settings-screen-title">⚙️ Einstellungen</div>
    </div>
    <div class="settings-body">
      <div class="setting-card">
        <label>Tagesziel (ml)</label>
        <input class="setting-input" id="s-goal" type="number" inputmode="numeric">
      </div>
      <div class="setting-card">
        <label>Schnell-Buttons (ml, kommagetrennt)</label>
        <input class="setting-input" id="s-presets" type="text" inputmode="numeric" placeholder="150,400,500">
      </div>
      <div class="setting-card">
        <label>Apps Script URL</label>
        <input class="setting-input" id="s-url" type="url">
      </div>
      <button class="settings-save" onclick="saveSettings()">Speichern</button>
    </div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">💧</button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">📋</button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">⚙️</button>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const LS_URL     = 'water_url';
const LS_GOAL    = 'water_goal';
const LS_PRESETS = 'water_presets';
const LS_CACHE   = 'water_cache';   // { date, total_ml, eintraege[] }
const LS_QUEUE   = 'water_queue';   // [ { action, ml, index, time } ]
const CIRC = 2 * Math.PI * 80;

let config = {
  url:     localStorage.getItem(LS_URL) || '',
  goal:    Number(localStorage.getItem(LS_GOAL) || 2500),
  presets: JSON.parse(localStorage.getItem(LS_PRESETS) || '[150,400]'),
};

let state = { datum: '', total_ml: 0, eintraege: [] };
let histOffset = 0;
let histData   = null;
let syncTimer  = null;

// ── LOCAL CACHE HELPERS ──────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function nowTime() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function loadCache() {
  try {
    const raw = localStorage.getItem(LS_CACHE);
    if (!raw) return null;
    const c = JSON.parse(raw);
    // Only valid if same day
    if (c.datum === todayStr()) return c;
    return null;
  } catch(e) { return null; }
}

function saveCache(s) {
  localStorage.setItem(LS_CACHE, JSON.stringify(s));
}

function loadQueue() {
  try { return JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); }
  catch(e) { return []; }
}

function saveQueue(q) {
  localStorage.setItem(LS_QUEUE, JSON.stringify(q));
}

function enqueue(op) {
  const q = loadQueue();
  q.push(op);
  saveQueue(q);
}

// ── INIT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!config.url) {
    document.getElementById('setup-screen').style.display = 'flex';
    return;
  }
  init();
});

async function init() {
  updateDateLabel();
  renderPresets();

  // 1. Show cached data instantly
  const cached = loadCache();
  if (cached) {
    state = cached;
    renderHome();
  }

  // 2. Flush any pending queue ops first, then sync from sheet
  await flushQueue();
  await syncFromSheet();

  document.getElementById('custom-ml').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustom();
  });

  // 3. Auto-sync every 5 minutes (in case another session added data)
  setInterval(syncFromSheet, 5 * 60 * 1000);
}

function updateDateLabel() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('de-CH', opts);
}

// ── SETUP ───────────────────────────────────────────────────
function saveSetup() {
  const url  = document.getElementById('setup-url').value.trim();
  const goal = Number(document.getElementById('setup-goal').value) || 2500;
  if (!url) { toast('Bitte URL eingeben'); return; }
  config.url  = url;
  config.goal = goal;
  localStorage.setItem(LS_URL, url);
  localStorage.setItem(LS_GOAL, goal);
  localStorage.setItem(LS_PRESETS, JSON.stringify(config.presets));
  document.getElementById('setup-screen').style.display = 'none';
  init();
}

// ── API ─────────────────────────────────────────────────────
async function api(params) {
  const url = new URL(config.url);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── SYNC ────────────────────────────────────────────────────
async function syncFromSheet() {
  try {
    const fresh = await api({ action: 'get' });
    state = fresh;
    saveCache(fresh);
    renderHome();
  } catch(e) {
    // Offline or error – silently ignore, cached data stays
  }
}

async function flushQueue() {
  const q = loadQueue();
  if (q.length === 0) return;
  try {
    for (const op of q) {
      if (op.action === 'add') {
        await api({ action: 'add', ml: op.ml });
      }
      // delete ops are tricky after offline – skip for now (single device, rare)
    }
    saveQueue([]);
  } catch(e) {
    // Still offline – keep queue
  }
}

// ── ADD / DELETE (optimistic) ────────────────────────────────
async function addMl(ml) {
  // 1. Optimistic: update local state immediately
  const time = nowTime();
  state.eintraege = state.eintraege || [];
  state.eintraege.push({ ml, time });
  state.total_ml = (state.total_ml || 0) + ml;
  state.datum = state.datum || todayStr();
  saveCache(state);
  renderHome();
  toast(`+${ml} ml 💧`);

  // 2. Try to sync to sheet in background
  try {
    const fresh = await api({ action: 'add', ml });
    state = fresh;
    saveCache(fresh);
    renderHome();
  } catch(e) {
    // Offline: enqueue for later
    enqueue({ action: 'add', ml, time });
    toast(`+${ml} ml 💧 (offline gespeichert)`);
  }
}

async function deleteEntry(index) {
  // 1. Optimistic: remove locally
  const removed = state.eintraege.splice(index, 1)[0];
  state.total_ml = state.eintraege.reduce((a, b) => a + b.ml, 0);
  saveCache(state);
  renderHome();

  // 2. Sync to sheet
  try {
    const fresh = await api({ action: 'delete', index });
    state = fresh;
    saveCache(fresh);
    renderHome();
  } catch(e) {
    // Offline: restore entry (delete can't be safely queued)
    state.eintraege.splice(index, 0, removed);
    state.total_ml += removed.ml;
    saveCache(state);
    renderHome();
    toast('Offline – Löschen nicht möglich');
  }
}

async function loadToday() {
  await syncFromSheet();
}

// ── RENDER HOME ──────────────────────────────────────────────
function renderHome() {
  const total = state.total_ml || 0;
  const goal  = config.goal;
  const pct   = Math.min(total / goal, 1);

  const fill = document.getElementById('ring-fill');
  fill.style.strokeDashoffset = CIRC - pct * CIRC;
  fill.classList.toggle('over', total >= goal);

  document.getElementById('ring-ml').textContent   = total.toLocaleString('de-CH');
  document.getElementById('ring-goal').textContent = `/ ${goal.toLocaleString('de-CH')} ml`;

  const sb  = document.getElementById('status-bar');
  const rem = goal - total;
  if (total === 0) {
    sb.textContent = 'Noch nichts getrunken heute';
    sb.className = 'status-bar';
  } else if (total >= goal) {
    sb.textContent = `🎉 Tagesziel erreicht! +${(total - goal).toLocaleString('de-CH')} ml`;
    sb.className = 'status-bar done';
  } else {
    sb.textContent = `Noch ${rem.toLocaleString('de-CH')} ml bis zum Ziel`;
    sb.className = 'status-bar';
  }

}

function renderPresets() {
  const grid = document.getElementById('presets-grid');
  grid.innerHTML = config.presets.map(ml => `
    <button class="preset-btn" onclick="addMl(${ml})">
      ${ml}<span>ml</span>
    </button>
  `).join('');
}

function addCustom() {
  const input = document.getElementById('custom-ml');
  const ml = Number(input.value);
  if (!ml || ml <= 0) { toast('Bitte gültige ml eingeben'); return; }
  input.value = '';
  addMl(ml);
}

// ── HISTORY ──────────────────────────────────────────────────
function getHistDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatHistLabel(offset) {
  if (offset === 0)  return 'Heute';
  if (offset === -1) return 'Gestern';
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long' });
}

function formatHistSub(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

async function loadHistory() {
  const dateStr = getHistDate(histOffset);

  document.getElementById('hist-day-label').innerHTML =
    formatHistLabel(histOffset) +
    `<span class="day-nav-sub">${formatHistSub(histOffset)}</span>`;

  document.getElementById('hist-next').disabled = histOffset >= 0;

  // Show cached today-data instantly for offset=0
  if (histOffset === 0 && state.eintraege) {
    histData = state;
    renderHistory();
  } else {
    document.getElementById('hist-list').innerHTML = '<div class="hist-loading">Lade…</div>';
    drawChart([], config.goal);
  }

  // Always fetch fresh from sheet in background
  try {
    const fresh = await api({ action: 'history', date: dateStr });
    histData = fresh;
    // Also update state cache if it's today
    if (histOffset === 0) { state = fresh; saveCache(fresh); }
    renderHistory();
  } catch(e) {
    if (!histData) {
      document.getElementById('hist-list').innerHTML =
        `<div class="hist-loading">Offline – keine Daten verfügbar</div>`;
    }
  }
}

function renderHistory() {
  if (!histData) return;
  const goal    = config.goal;
  const entries = histData.eintraege || [];
  const list    = document.getElementById('hist-list');

  // Draw chart
  drawChart(entries, goal);

  if (entries.length === 0) {
    list.innerHTML = '<div class="hist-loading">Keine Einträge für diesen Tag</div>';
    return;
  }

  list.innerHTML = entries.map((e, i) => {
    const running = entries.slice(0, i + 1).reduce((a, b) => a + b.ml, 0);
    const pct = Math.round((running / goal) * 100);
    return `
    <div class="hist-entry">
      <div class="hist-time">${e.time || '--:--'}</div>
      <div class="hist-dot"></div>
      <div class="hist-ml">${e.ml}<span class="hist-ml-unit"> ml</span></div>
      <div class="hist-pct-entry">${pct}%</div>
    </div>
  `}).join('');
}

function drawChart(entries, goal) {
  const canvas = document.getElementById('hist-chart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || canvas.parentElement.clientWidth - 24;
  const H = 160;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD_L = 44, PAD_R = 12, PAD_T = 12, PAD_B = 24;
  const cW = W - PAD_L - PAD_R;
  const cH = H - PAD_T - PAD_B;

  // Colors from CSS vars (read from root)
  const colWater   = '#3b9eff';
  const colSuccess = '#4ecb8d';
  const colDim     = '#7aa8d4';
  const colBorder  = '#1e3a5f';
  const colSurface2= '#132844';

  // Y-axis max: goal * 1.2 or actual total if higher
  const total = entries.reduce((a, b) => a + b.ml, 0);
  const yMax  = Math.max(goal * 1.2, total * 1.05, 500);

  function xPos(minutes) { return PAD_L + (minutes / 1440) * cW; }
  function yPos(ml)      { return PAD_T + cH - (ml / yMax) * cH; }

  // Grid lines & Y labels
  ctx.strokeStyle = colBorder;
  ctx.lineWidth = 1;
  ctx.fillStyle = colDim;
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'right';
  const ySteps = [0, goal * 0.25, goal * 0.5, goal * 0.75, goal].map(v => Math.round(v));
  ySteps.forEach(v => {
    const y = yPos(v);
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(1)+'L' : v+'ml', PAD_L - 4, y + 3);
  });

  // X-axis labels (0, 6, 12, 18, 24)
  ctx.textAlign = 'center';
  [0, 6, 12, 18, 24].forEach(h => {
    const x = xPos(h * 60);
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, H - PAD_B); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillText(h + 'h', x, H - PAD_B + 14);
  });

  // Goal line (dashed)
  ctx.save();
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = colSuccess;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.7;
  const gy = yPos(goal);
  ctx.beginPath(); ctx.moveTo(PAD_L, gy); ctx.lineTo(W - PAD_R, gy); ctx.stroke();
  ctx.restore();

  // Goal label
  ctx.fillStyle = colSuccess;
  ctx.globalAlpha = 0.9;
  ctx.textAlign = 'left';
  ctx.font = '9px DM Mono, monospace';
  ctx.fillText('Ziel', PAD_L + 4, gy - 3);
  ctx.globalAlpha = 1;

  if (entries.length === 0) return;

  // Build cumulative points: start at (0, 0), then each entry
  const points = [{x: 0, y: 0}];
  let running = 0;
  entries.forEach(e => {
    const [hh, mm] = (e.time || '00:00').split(':').map(Number);
    const mins = hh * 60 + mm;
    running += e.ml;
    points.push({ x: mins, y: running });
  });
  // Extend to current time (or end of day)
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  points.push({ x: Math.min(nowMins, 1439), y: running });

  // Fill area under curve
  const grad = ctx.createLinearGradient(0, PAD_T, 0, H - PAD_B);
  grad.addColorStop(0, '#3b9eff44');
  grad.addColorStop(1, '#3b9eff00');
  ctx.beginPath();
  ctx.moveTo(xPos(points[0].x), yPos(points[0].y));
  points.forEach(p => ctx.lineTo(xPos(p.x), yPos(p.y)));
  ctx.lineTo(xPos(points[points.length-1].x), yPos(0));
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = colWater;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.moveTo(xPos(points[0].x), yPos(points[0].y));
  points.forEach(p => ctx.lineTo(xPos(p.x), yPos(p.y)));
  ctx.stroke();

  // Dots at each entry
  entries.forEach(e => {
    const [hh, mm] = (e.time || '00:00').split(':').map(Number);
    const mins = hh * 60 + mm;
    let cumY = 0;
    entries.forEach(ee => {
      const [ehh, emm] = (ee.time || '00:00').split(':').map(Number);
      if (ehh * 60 + emm <= mins) cumY += ee.ml;
    });
    ctx.beginPath();
    ctx.arc(xPos(mins), yPos(cumY), 4, 0, Math.PI * 2);
    ctx.fillStyle = colWater;
    ctx.fill();
    ctx.strokeStyle = '#060f1e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

function histNav(delta) {
  histOffset += delta;
  if (histOffset > 0) histOffset = 0;
  loadHistory();
}

// ── TAB SWITCHING ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'history') {
    histOffset = 0;
    loadHistory();
  }
  if (tab === 'settings') {
    document.getElementById('s-goal').value    = config.goal;
    document.getElementById('s-presets').value = config.presets.join(',');
    document.getElementById('s-url').value     = config.url;
  }
}

// ── SETTINGS ────────────────────────────────────────────────
function saveSettings() {
  const goal    = Number(document.getElementById('s-goal').value) || 2500;
  const presets = document.getElementById('s-presets').value
    .split(',').map(x => Number(x.trim())).filter(x => x > 0);
  const url = document.getElementById('s-url').value.trim();
  config.goal    = goal;
  config.presets = presets;
  if (url) config.url = url;
  localStorage.setItem(LS_GOAL, goal);
  localStorage.setItem(LS_PRESETS, JSON.stringify(presets));
  if (url) localStorage.setItem(LS_URL, url);
  renderPresets();
  renderHome();
  toast('Gespeichert ✓');
}

// ── HELPERS ─────────────────────────────────────────────────
function setLoading(on) { /* no-op: optimistic UI, no blocking spinner */ }
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js?v=1.0").then(function(reg){
      reg.update();
      reg.addEventListener("updatefound",function(){
        var nw=reg.installing;
        nw.addEventListener("statechange",function(){
          if(nw.state==="installed"&&navigator.serviceWorker.controller){
            showUpdateToast(nw);
          }
        });
      });
      if(reg.waiting){
        showUpdateToast(reg.waiting);
      }
      setTimeout(function(){
        reg.update().then(function(){
          if(reg.waiting) showUpdateToast(reg.waiting);
        });
      }, 2000);
    }).catch(function(err){console.log("SW:",err);});
    var ref=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(!ref){ref=true;window.location.reload();}
    });
  });
}
function showUpdateToast(w){
  var t=document.getElementById("toast");
  if(!t)return;
  t.innerHTML="&#128260; Update verf\u00fcgbar <button onclick=\"applyUpdate()\" style=\"background:#3b9eff;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px;-webkit-tap-highlight-color:transparent\">Jetzt laden</button>";
  t.classList.add("show");
  t.style.whiteSpace="nowrap";
  t.style.bottom="60px";
  t.style.pointerEvents="all";
  window._pw=w;
}
function applyUpdate(){
  if(window._pw){
    window._pw.postMessage({type:"SKIP_WAITING"});
  } else {
    window.location.reload(true);
  }
}
</script>
