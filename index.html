<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Water</title>
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Water">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #060f1e;
      --surface:   #0d1f38;
      --surface2:  #132844;
      --border:    #1e3a5f;
      --water:     #3b9eff;
      --water-dim: #1d5fa8;
      --water-glow:#3b9eff44;
      --text:      #e8f4ff;
      --text-dim:  #7aa8d4;
      --danger:    #ff5c5c;
      --success:   #4ecb8d;
      --radius:    16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Animated water background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, #0a3060 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, #0a2548 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100dvh; }

    /* ── HEADER ── */
    header {
      padding: 52px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--water);
    }

    .date-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── PROGRESS RING ── */
    .ring-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 8px;
    }

    .ring-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .ring-svg { transform: rotate(-90deg); }

    .ring-bg   { fill: none; stroke: var(--surface2); stroke-width: 12; }
    .ring-fill {
      fill: none;
      stroke: var(--water);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 565;
      stroke-dashoffset: 565;
      filter: drop-shadow(0 0 8px var(--water));
      transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
    }
    .ring-fill.over {
      stroke: var(--success);
      filter: drop-shadow(0 0 8px var(--success));
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-ml {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .ring-unit { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .ring-goal { font-size: 11px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.05em; }

    /* ── STATUS ── */
    .status-bar {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 8px 24px 20px;
      letter-spacing: 0.05em;
    }
    .status-bar.done { color: var(--success); }

    /* ── PRESETS ── */
    .section { padding: 0 20px 16px; }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .presets-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preset-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      padding: 16px 0;
      flex: 1;
      min-width: 80px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      -webkit-user-select: none;
      user-select: none;
    }
    .preset-btn span { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-weight: 300; }

    .preset-btn:active {
      background: var(--water-dim);
      border-color: var(--water);
      transform: scale(0.96);
    }

    .preset-btn.add-btn {
      background: var(--water);
      border-color: var(--water);
      color: #fff;
      font-size: 22px;
    }
    .preset-btn.add-btn span { color: #ffffffaa; }
    .preset-btn.add-btn:active { background: var(--water-dim); }

    /* ── CUSTOM INPUT ── */
    .custom-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .custom-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-input:focus { border-color: var(--water); }
    .custom-input::placeholder { color: var(--text-dim); font-size: 14px; }

    .custom-go {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--water);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .custom-go:active { background: var(--water); color: #fff; }

    /* ── ENTRIES ── */
    .entries-list {
      flex: 1;
      padding: 0 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-ml {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: var(--water);
    }
    .entry-idx { font-size: 11px; color: var(--text-dim); }

    .entry-del {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.15s;
      line-height: 1;
    }
    .entry-del:active { background: var(--danger); color: #fff; }

    .empty-hint {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      padding: 24px 0;
      letter-spacing: 0.05em;
    }

    /* ── SETTINGS DRAWER ── */
    .settings-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: #00000088;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px 24px 48px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .drawer h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .setting-row {
      margin-bottom: 18px;
    }

    .setting-row label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .setting-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      padding: 12px 16px;
      outline: none;
    }
    .setting-input:focus { border-color: var(--water); }

    .drawer-save {
      width: 100%;
      background: var(--water);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    .drawer-save:active { opacity: 0.8; }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .setup-logo {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: var(--water);
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px var(--water-glow));
    }

    .setup-sub {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }

    .setup-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      width: 100%;
      margin-bottom: 8px;
    }

    .setup-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 14px 16px;
      outline: none;
      margin-bottom: 24px;
    }
    .setup-input:focus { border-color: var(--water); }

    .setup-btn {
      width: 100%;
      background: var(--water);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      padding: 18px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── SPINNER ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--water);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: #00000044;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<!-- SETUP SCREEN (shown on first launch) -->
<div id="setup-screen" style="display:none">
  <div class="setup-logo">💧</div>
  <div class="setup-logo" style="font-size:32px;margin-top:-12px">Water</div>
  <div class="setup-sub">Einmalig einrichten</div>

  <div class="setup-label">Google Apps Script URL</div>
  <input class="setup-input" id="setup-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">

  <div class="setup-label">Tagesziel (ml)</div>
  <input class="setup-input" id="setup-goal" type="number" value="2500" inputmode="numeric">

  <button class="setup-btn" onclick="saveSetup()">Speichern & Starten</button>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- SETTINGS DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <h2>Einstellungen</h2>

  <div class="setting-row">
    <label>Tagesziel (ml)</label>
    <input class="setting-input" id="s-goal" type="number" inputmode="numeric">
  </div>
  <div class="setting-row">
    <label>Schnell-Buttons (ml, kommagetrennt)</label>
    <input class="setting-input" id="s-presets" type="text" inputmode="numeric" placeholder="150,400,500">
  </div>
  <div class="setting-row">
    <label>Apps Script URL</label>
    <input class="setting-input" id="s-url" type="url">
  </div>
  <button class="drawer-save" onclick="saveSettings()">Speichern</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">💧 Water</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="date-label" id="date-label"></div>
      <button class="settings-btn" onclick="openDrawer()">⚙️</button>
    </div>
  </header>

  <!-- RING -->
  <div class="ring-section">
    <div class="ring-wrap">
      <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg"   cx="100" cy="100" r="90"/>
        <circle class="ring-fill" cx="100" cy="100" r="90" id="ring-fill"/>
      </svg>
      <div class="ring-center">
        <div class="ring-ml" id="ring-ml">0</div>
        <div class="ring-unit">ml</div>
        <div class="ring-goal" id="ring-goal">/ 2500 ml</div>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">Noch nichts getrunken heute</div>

  <!-- PRESETS -->
  <div class="section">
    <div class="section-label">Schnell hinzufügen</div>
    <div class="presets-grid" id="presets-grid"></div>
  </div>

  <!-- CUSTOM -->
  <div class="section">
    <div class="section-label">Manuell</div>
    <div class="custom-row">
      <input class="custom-input" id="custom-ml" type="number" inputmode="numeric" placeholder="ml eingeben">
      <button class="custom-go" onclick="addCustom()">+ ADD</button>
    </div>
  </div>

  <!-- ENTRIES -->
  <div class="entries-list" id="entries-list"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const LS_URL     = 'water_url';
const LS_GOAL    = 'water_goal';
const LS_PRESETS = 'water_presets';
const CIRC       = 2 * Math.PI * 90; // 565.49

let config = {
  url:     localStorage.getItem(LS_URL) || '',
  goal:    Number(localStorage.getItem(LS_GOAL) || 2500),
  presets: JSON.parse(localStorage.getItem(LS_PRESETS) || '[150,400]'),
};

let state = { datum: '', total_ml: 0, eintraege: [] };

// ── INIT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!config.url) {
    document.getElementById('setup-screen').style.display = 'flex';
    return;
  }
  init();
});

async function init() {
  updateDateLabel();
  renderPresets();
  await loadToday();
}

function updateDateLabel() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('de-CH', opts);
}

// ── SETUP ───────────────────────────────────────────────────
function saveSetup() {
  const url  = document.getElementById('setup-url').value.trim();
  const goal = Number(document.getElementById('setup-goal').value) || 2500;
  if (!url) { toast('Bitte URL eingeben'); return; }

  config.url  = url;
  config.goal = goal;
  localStorage.setItem(LS_URL, url);
  localStorage.setItem(LS_GOAL, goal);
  localStorage.setItem(LS_PRESETS, JSON.stringify(config.presets));

  document.getElementById('setup-screen').style.display = 'none';
  init();
}

// ── API ─────────────────────────────────────────────────────
async function api(params) {
  const url = new URL(config.url);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const resp = await fetch(url.toString());
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadToday() {
  setLoading(true);
  try {
    state = await api({ action: 'get' });
    render();
  } catch(e) { toast('Fehler: ' + e.message); }
  setLoading(false);
}

async function addMl(ml) {
  setLoading(true);
  try {
    state = await api({ action: 'add', ml });
    render();
    toast(`+${ml} ml 💧`);
  } catch(e) { toast('Fehler: ' + e.message); }
  setLoading(false);
}

async function deleteEntry(index) {
  setLoading(true);
  try {
    state = await api({ action: 'delete', index });
    render();
  } catch(e) { toast('Fehler: ' + e.message); }
  setLoading(false);
}

// ── RENDER ──────────────────────────────────────────────────
function render() {
  const total = state.total_ml || 0;
  const goal  = config.goal;
  const pct   = Math.min(total / goal, 1);

  // Ring
  const fill = document.getElementById('ring-fill');
  fill.style.strokeDashoffset = CIRC - pct * CIRC;
  fill.classList.toggle('over', total >= goal);

  document.getElementById('ring-ml').textContent  = total.toLocaleString('de-CH');
  document.getElementById('ring-goal').textContent = `/ ${goal.toLocaleString('de-CH')} ml`;

  // Status
  const sb = document.getElementById('status-bar');
  const rem = goal - total;
  if (total === 0) {
    sb.textContent = 'Noch nichts getrunken heute';
    sb.className = 'status-bar';
  } else if (total >= goal) {
    sb.textContent = `🎉 Tagesziel erreicht! +${(total - goal).toLocaleString('de-CH')} ml`;
    sb.className = 'status-bar done';
  } else {
    sb.textContent = `Noch ${rem.toLocaleString('de-CH')} ml bis zum Ziel`;
    sb.className = 'status-bar';
  }

  // Entries
  const list = document.getElementById('entries-list');
  const entries = state.eintraege || [];
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-hint">Noch keine Einträge heute</div>';
    return;
  }

  list.innerHTML = entries.map((ml, i) => `
    <div class="entry-chip">
      <span class="entry-idx">#${i + 1}</span>
      <span class="entry-ml">${ml} ml</span>
      <button class="entry-del" onclick="deleteEntry(${i})">×</button>
    </div>
  `).join('');
}

function renderPresets() {
  const grid = document.getElementById('presets-grid');
  grid.innerHTML = config.presets.map(ml => `
    <button class="preset-btn add-btn" onclick="addMl(${ml})">
      ${ml}
      <span>ml</span>
    </button>
  `).join('');
}

// ── CUSTOM INPUT ────────────────────────────────────────────
function addCustom() {
  const input = document.getElementById('custom-ml');
  const ml = Number(input.value);
  if (!ml || ml <= 0) { toast('Bitte gültige ml eingeben'); return; }
  input.value = '';
  addMl(ml);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('custom-ml').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustom();
  });
});

// ── SETTINGS ────────────────────────────────────────────────
function openDrawer() {
  document.getElementById('s-goal').value    = config.goal;
  document.getElementById('s-presets').value = config.presets.join(',');
  document.getElementById('s-url').value     = config.url;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

async function saveSettings() {
  const goal    = Number(document.getElementById('s-goal').value) || 2500;
  const presets = document.getElementById('s-presets').value
    .split(',').map(x => Number(x.trim())).filter(x => x > 0);
  const url = document.getElementById('s-url').value.trim();

  config.goal    = goal;
  config.presets = presets;
  if (url) config.url = url;

  localStorage.setItem(LS_GOAL,    goal);
  localStorage.setItem(LS_PRESETS, JSON.stringify(presets));
  if (url) localStorage.setItem(LS_URL, url);

  renderPresets();
  render();
  closeDrawer();
  toast('Gespeichert ✓');
}

// ── HELPERS ─────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js?v=1.0').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            toast('Update verfügbar – bitte neu laden');
          }
        });
      });
